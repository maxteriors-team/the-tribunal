# Pre-commit hooks for The Tribunal.
# Install: pre-commit install
# Run on all files: pre-commit run --all-files
# Update hook versions: pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        # ``backend/openapi.json`` is a generated snapshot of the FastAPI
        # schema (~1 MB) committed as the source of truth for the CI
        # freshness gate (see .github/workflows/backend-ci.yml). It must be
        # tracked so ``git diff --exit-code`` can detect drift.
        exclude: ^backend/openapi\.json$

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint (staged ts/tsx)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend typecheck (staged ts/tsx)
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
