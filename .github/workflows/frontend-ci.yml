name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-version-check:
    name: Verify Node version matches .nvmrc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compare workflow Node version to frontend/.nvmrc
        run: |
          set -euo pipefail
          nvmrc_version="$(tr -d '[:space:]' < frontend/.nvmrc)"
          nvmrc_major="${nvmrc_version%%.*}"
          workflow_major="20"
          echo "frontend/.nvmrc declares Node ${nvmrc_version} (major ${nvmrc_major})"
          echo "Workflow pins Node major ${workflow_major}"
          if [ "${nvmrc_major}" != "${workflow_major}" ]; then
            echo "::error file=frontend/.nvmrc::Node major version drift: .nvmrc=${nvmrc_major} but frontend-ci.yml pins ${workflow_major}. Update both to match."
            exit 1
          fi

  build:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    needs: node-version-check
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify package-lock.json is in sync with package.json
        # Frozen-lockfile discipline (mirrors `uv lock --check` on the backend). `npm ci`
        # already refuses to install when the lockfile diverges, but this explicit step
        # gives a clearer failure message and runs before any install side-effects.
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "::error file=frontend/package.json::package-lock.json is missing. Run 'cd frontend && npm install' and commit the lockfile."
            exit 1
          fi
          # --package-lock-only + --dry-run would rewrite the lockfile; instead use
          # `npm ci --dry-run` which exits non-zero on package.json/lockfile drift
          # without touching node_modules.
          if ! npm ci --dry-run >/dev/null 2>&1; then
            echo "::error file=frontend/package-lock.json::package-lock.json is out of sync with package.json. Run 'cd frontend && npm install' and commit the regenerated lockfile."
            exit 1
          fi

      - name: Install dependencies (frozen lockfile)
        # `npm ci` requires package-lock.json and refuses to update it — the npm
        # equivalent of `uv sync --frozen`. Never replace with `npm install` in CI.
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  e2e:
    name: Playwright end-to-end
    runs-on: ubuntu-latest
    needs: build
    # E2E runs on pull requests only to keep push CI fast.
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (frozen lockfile)
        # `npm ci` enforces the same lockfile guarantee as the build job above;
        # the explicit sync check there gates the workflow, so this step is safe
        # to assume an in-sync lockfile.
        run: npm ci

      - name: Resolve Playwright version
        id: playwright_version
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache_playwright_browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright_version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.cache_playwright_browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.cache_playwright_browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: "true"
          # Optional seeded user — when unset, auth-gated specs self-skip.
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore
