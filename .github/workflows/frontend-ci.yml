name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-version-check:
    name: Verify Node version matches .nvmrc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compare workflow Node version to frontend/.nvmrc
        run: |
          set -euo pipefail
          nvmrc_version="$(tr -d '[:space:]' < frontend/.nvmrc)"
          nvmrc_major="${nvmrc_version%%.*}"
          workflow_major="20"
          echo "frontend/.nvmrc declares Node ${nvmrc_version} (major ${nvmrc_major})"
          echo "Workflow pins Node major ${workflow_major}"
          if [ "${nvmrc_major}" != "${workflow_major}" ]; then
            echo "::error file=frontend/.nvmrc::Node major version drift: .nvmrc=${nvmrc_major} but frontend-ci.yml pins ${workflow_major}. Update both to match."
            exit 1
          fi

  build:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    needs: node-version-check
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
