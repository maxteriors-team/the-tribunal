name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/lib/api/_generated.ts"
      - "Makefile"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/lib/api/_generated.ts"
      - "Makefile"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Node.js for API client codegen
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend CI parity
        # Coverage floor ratchets up by +5pts whenever a coverage-improvement task lands.
        # Policy: see CONTRIBUTING.md § Coverage Ratchet. Current floor: 48%.
        run: make ci.backend

      - name: OpenAPI codegen freshness
        # Regenerate committed API artifacts from the live FastAPI app and fail
        # if they drift, so contract changes are reviewable in the PR diff.
        run: make codegen/check
